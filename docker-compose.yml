version: "3.8"

services:
  xhs-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xhs_spider_api
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_ENV=production
    volumes:
      # Mount .env để có thể thay đổi cookies mà không cần rebuild
      - ./.env:/app/.env:ro
    restart: unless-stopped
